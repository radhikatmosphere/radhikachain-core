name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  validate:
    name: Validate scripts and secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: bash scripts/check-secrets.sh
      - name: Script tests
        run: bash scripts/test-compile.sh

  package-scripts:
    name: Package PoK miner (scripts)
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tarball
        run: |
          VERSION="${{ github.ref_name }}"
          ARTIFACT="radhikachain-${VERSION}-miner-scripts"
          mkdir -p "$ARTIFACT/bin" "$ARTIFACT/share"
          cp scripts/karma-mine.py "$ARTIFACT/bin/karma-mine"
          chmod +x "$ARTIFACT/bin/karma-mine"
          cp requirements-miner.txt .env.example install.sh Makefile "$ARTIFACT/share/"
          tar czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
      - name: Upload scripts artifact
        uses: actions/upload-artifact@v4
        with:
          name: radhikachain-miner-scripts
          path: radhikachain-*-miner-scripts.tar.gz*

  build-linux:
    needs: [validate]
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libevent-dev \
            libboost-system-dev libboost-filesystem-dev libboost-thread-dev \
            libboost-test-dev libboost-chrono-dev libboost-program-options-dev \
            libzmq3-dev libsqlite3-dev \
            libcapnp-dev capnproto \
            libnatpmp-dev libminiupnpc-dev
      - name: Build
        run: |
          cmake -B build -GNinja \
            -DBUILD_DAEMON=ON \
            -DBUILD_CLI=ON \
            -DBUILD_TX=ON \
            -DBUILD_TESTS=OFF \
            -DENABLE_WALLET=ON
          cmake --build build -j"$(nproc)"
      - name: Package tarball
        run: |
          ARTIFACT="radhikachain-${{ github.ref_name }}-x86_64-linux-gnu"
          mkdir -p "$ARTIFACT/bin"
          cp build/bin/bitcoind "$ARTIFACT/bin/radhikad"
          cp build/bin/bitcoin-cli "$ARTIFACT/bin/radhika-cli"
          cp build/bin/bitcoin-tx "$ARTIFACT/bin/radhika-tx"
          cp contrib/docker/entrypoint.sh share/radhika.conf.template "$ARTIFACT/"
          tar czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radhikachain-${{ github.ref_name }}-x86_64-linux-gnu
          path: |
            radhikachain-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz
            radhikachain-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sha256

  release:
    name: Create GitHub Release
    needs: [package-scripts, build-linux]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -name "*.sha256" -exec cat {} \; > SHA256SUMS
          cat SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/radhikachain-*-miner-scripts.tar.gz
            artifacts/**/radhikachain-*-miner-scripts.tar.gz.sha256
            artifacts/**/radhikachain-*-x86_64-linux-gnu.tar.gz
            artifacts/**/radhikachain-*-x86_64-linux-gnu.tar.gz.sha256
            artifacts/SHA256SUMS
          generate_release_notes: true