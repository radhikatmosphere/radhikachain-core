name: Release Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Version tag (e.g., v1.0.0)'
        required: true

jobs:
  validate:
    name: Validate scripts and secrets
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Secret scan
        run: bash scripts/check-secrets.sh
      - name: Script tests
        run: bash scripts/test-compile.sh

  package-scripts:
    name: Package PoK miner (scripts)
    needs: [validate]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build tarball
        run: |
          VERSION="${{ github.ref_name }}"
          ARTIFACT="radhikachain-${VERSION}-miner-scripts"
          mkdir -p "$ARTIFACT/bin" "$ARTIFACT/share"
          cp scripts/karma-mine.py "$ARTIFACT/bin/karma-mine"
          chmod +x "$ARTIFACT/bin/karma-mine"
          cp requirements-miner.txt .env.example install.sh Makefile "$ARTIFACT/share/"
          tar czf "${ARTIFACT}.tar.gz" "$ARTIFACT"
          sha256sum "${ARTIFACT}.tar.gz" > "${ARTIFACT}.tar.gz.sha256"
      - name: Upload scripts artifact
        uses: actions/upload-artifact@v4
        with:
          name: radhikachain-miner-scripts
          path: radhikachain-*-miner-scripts.tar.gz*

  build-linux:
    needs: [validate]
    name: Build Linux x86_64
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            libssl-dev libevent-dev \
            libboost-system-dev libboost-filesystem-dev libboost-thread-dev \
            libboost-test-dev libboost-chrono-dev libboost-program-options-dev \
            libzmq3-dev libsqlite3-dev \
            libcapnp-dev capnproto \
            libnatpmp-dev libminiupnpc-dev
      - name: Build
        run: make build
      - name: Smoke test
        run: bash scripts/smoke-node.sh
      - name: Package tarball
        run: VERSION="${{ github.ref_name }}" make package-linux
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radhikachain-${{ github.ref_name }}-x86_64-linux-gnu
          path: |
            dist/radhikachain-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz
            dist/radhikachain-${{ github.ref_name }}-x86_64-linux-gnu.tar.gz.sha256

  build-windows-cross:
    needs: [validate]
    name: Build Windows x86_64 (cross-compile)
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config curl make patch \
            g++-mingw-w64-x86-64-posix zip
      - name: Cache depends mingw
        uses: actions/cache@v4
        with:
          path: depends/built
          key: depends-mingw32-${{ hashFiles('depends/packages/**', 'depends/patches/**') }}
          restore-keys: depends-mingw32-
      - name: Build Windows binaries
        run: make build-win
      - name: Package zip
        run: VERSION="${{ github.ref_name }}" make package-win
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: radhikachain-${{ github.ref_name }}-win64
          path: |
            dist/radhikachain-${{ github.ref_name }}-win64.zip
            dist/radhikachain-${{ github.ref_name }}-win64.zip.sha256

  release:
    name: Create GitHub Release
    needs: [package-scripts, build-linux, build-windows-cross]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
      - name: Generate SHA256SUMS
        run: |
          cd artifacts
          find . -name "*.sha256" -exec cat {} \; > SHA256SUMS
          cat SHA256SUMS
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            artifacts/**/radhikachain-*-miner-scripts.tar.gz
            artifacts/**/radhikachain-*-miner-scripts.tar.gz.sha256
            artifacts/**/radhikachain-*-x86_64-linux-gnu.tar.gz
            artifacts/**/radhikachain-*-x86_64-linux-gnu.tar.gz.sha256
            artifacts/**/radhikachain-*-win64.zip
            artifacts/**/radhikachain-*-win64.zip.sha256
            artifacts/SHA256SUMS
          generate_release_notes: true