name: Security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  secret-scan:
    name: Secret scan (no hardcoded credentials)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run local secret patterns check
        run: bash scripts/check-secrets.sh

      - name: Block tracked env files
        run: |
          if git ls-files '.env' '.env.*' '**/.env' '**/.env.*' 2>/dev/null | grep -q .; then
            echo "::error::Tracked .env file detected"
            git ls-files '.env' '.env.*' '**/.env' '**/.env.*' || true
            exit 1
          fi
          echo "OK: no tracked .env files"

      - name: Gitleaks scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: false